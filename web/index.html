<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="yudao flutter ui实现">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="yudao_flutter_ui_admin">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>yudao_flutter_ui_admin</title>
  <link rel="manifest" href="manifest.json">

  <!-- 启动优化样式 -->
  <style>
    /* 隐藏 Flutter 默认加载指示器 */
    flutter-loader, .flutter-loader {
      display: none !important;
    }

    /* 加载容器 */
    #flutter-loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
    }

    #flutter-loading.fade-out {
      opacity: 0;
      visibility: hidden;
    }

    /* Logo 动画 */
    .loading-logo {
      width: 100px;
      height: 100px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .loading-logo svg {
      width: 100%;
      height: 100%;
      fill: white;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.08);
        opacity: 0.85;
      }
    }
  </style>
</head>
<body>
  <!-- Flutter 加载界面 -->
  <div id="flutter-loading">
    <div class="loading-logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
      </svg>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <!-- 启动优化脚本 -->
  <script>
    // 监听 Flutter 引擎准备就绪
    window.addEventListener('flutter-first-frame', function() {
      const loading = document.getElementById('flutter-loading');
      loading.classList.add('fade-out');
      setTimeout(() => loading.remove(), 500);
    });
  </script>
</body>
</html>
