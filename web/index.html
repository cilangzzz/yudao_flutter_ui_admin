<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="yudao flutter ui实现">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="yudao_flutter_ui_admin">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>yudao_flutter_ui_admin</title>
  <link rel="manifest" href="manifest.json">

  <!-- 启动优化样式 -->
  <style>
    /* 隐藏 Flutter 默认加载指示器 */
    flutter-loader, .flutter-loader {
      display: none !important;
    }

    /* 加载容器 - 浅色主题 */
    #flutter-loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.6s ease-out, visibility 0.6s ease-out;
    }

    /* 浅色主题背景 */
    #flutter-loading {
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
    }

    /* 深色主题 */
    @media (prefers-color-scheme: dark) {
      #flutter-loading {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      }
      .effect { color: #fff; }
      .rect { border-color: #40a9ff; }
    }

    #flutter-loading.fade-out {
      opacity: 0;
      visibility: hidden;
    }

    /* 3D 文字动画效果 */
    .effect {
      position: relative;
      font-size: 6vw;
      perspective: 5em;
      display: flex;
      transform-style: preserve-3d;
      color: #333;
    }

    .letter {
      width: 1.2em;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-size: 1em;
      font-weight: bold;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      animation: letter_rotate infinite 6s linear;
    }

    .rect {
      position: absolute;
      left: 0;
      width: 1.2em;
      height: 1.2em;
      box-sizing: border-box;
      border: solid 0.12em #1890FF;
      border-radius: 0.15em;
      transform: translateX(0em) rotateY(0deg);
    }

    .rect:nth-child(6n+1) {
      filter: hue-rotate(0deg);
      animation: rect1_animation infinite 6s linear;
      animation-delay: -1.0s;
    }
    .rect:nth-child(6n+2) {
      filter: hue-rotate(15deg);
      animation: rect2_animation infinite 6s linear;
      animation-delay: -0.8s;
    }
    .rect:nth-child(6n+3) {
      filter: hue-rotate(30deg);
      animation: rect3_animation infinite 6s linear;
      animation-delay: -0.6s;
    }
    .rect:nth-child(6n+4) {
      filter: hue-rotate(15deg);
      animation: rect4_animation infinite 6s linear;
      animation-delay: -0.4s;
    }
    .rect:nth-child(6n+5) {
      filter: hue-rotate(0deg);
      animation: rect5_animation infinite 6s linear;
      animation-delay: -0.2s;
    }
    .rect:nth-child(6n+6) {
      filter: hue-rotate(-15deg);
      animation: rect6_animation infinite 6s linear;
      animation-delay: 0s;
    }

    .letter:nth-child(6n+1) { animation-delay: -1.0s; }
    .letter:nth-child(6n+2) { animation-delay: -0.8s; }
    .letter:nth-child(6n+3) { animation-delay: -0.6s; }
    .letter:nth-child(6n+4) { animation-delay: -0.4s; }
    .letter:nth-child(6n+5) { animation-delay: -0.2s; }
    .letter:nth-child(6n+6) { animation-delay: 0s; }

    @keyframes letter_rotate {
      0%    { opacity: 0; transform: rotateY(90deg); }
      16.6% { opacity: 0; transform: rotateY(90deg); }
      16.7% { opacity: 1; transform: rotateY(90deg); }
      33.3% { opacity: 1; transform: rotateY(720deg); }
      100%  { opacity: 1; transform: rotateY(720deg); }
    }

    @keyframes rect1_animation {
      0%    { opacity: 0; transform: rotateY(0deg); }
      16.6% { opacity: 0; transform: rotateY(0deg); }
      16.7% { opacity: 1; transform: translate(0em) rotateY(0deg); }
      19.4% { opacity: 1; transform: translate(0em) rotateY(-90deg); }
      22.2% { opacity: 1; transform: translate(1.2em) rotateY(90deg); }
      25.0% { opacity: 1; transform: translate(2.4em) rotateY(-90deg); }
      27.8% { opacity: 1; transform: translate(3.6em) rotateY(90deg); }
      30.6% { opacity: 1; transform: translate(4.8em) rotateY(-90deg); }
      33.3% { opacity: 1; transform: translate(6.0em) rotateY(0deg); }
      100%  { opacity: 1; transform: translate(6.0em) rotateY(0deg); }
    }

    @keyframes rect2_animation {
      0%    { opacity: 0; transform: rotateY(0deg); }
      16.6% { opacity: 0; transform: rotateY(0deg); }
      16.7% { opacity: 1; transform: translate(0em) rotateY(0deg); }
      19.4% { opacity: 1; transform: translate(0em) rotateY(-90deg); }
      22.2% { opacity: 1; transform: translate(1.2em) rotateY(90deg); }
      25.0% { opacity: 1; transform: translate(2.4em) rotateY(-90deg); }
      27.8% { opacity: 1; transform: translate(3.6em) rotateY(90deg); }
      30.6% { opacity: 1; transform: translate(4.8em) rotateY(-90deg); }
      100%  { opacity: 1; transform: translate(4.8em) rotateY(-90deg); }
    }

    @keyframes rect3_animation {
      0%    { opacity: 0; transform: rotateY(0deg); }
      16.6% { opacity: 0; transform: rotateY(0deg); }
      16.7% { opacity: 1; transform: translate(0em) rotateY(0deg); }
      19.4% { opacity: 1; transform: translate(0em) rotateY(-90deg); }
      22.2% { opacity: 1; transform: translate(1.2em) rotateY(90deg); }
      25.0% { opacity: 1; transform: translate(2.4em) rotateY(-90deg); }
      27.8% { opacity: 1; transform: translate(3.6em) rotateY(90deg); }
      100%  { opacity: 1; transform: translate(3.6em) rotateY(90deg); }
    }

    @keyframes rect4_animation {
      0%    { opacity: 0; transform: rotateY(0deg); }
      16.6% { opacity: 0; transform: rotateY(0deg); }
      16.7% { opacity: 1; transform: translate(0em) rotateY(0deg); }
      19.4% { opacity: 1; transform: translate(0em) rotateY(-90deg); }
      22.2% { opacity: 1; transform: translate(1.2em) rotateY(90deg); }
      25.0% { opacity: 1; transform: translate(2.4em) rotateY(-90deg); }
      100%  { opacity: 1; transform: translate(2.4em) rotateY(-90deg); }
    }

    @keyframes rect5_animation {
      0%    { opacity: 0; transform: rotateY(0deg); }
      16.6% { opacity: 0; transform: rotateY(0deg); }
      16.7% { opacity: 1; transform: translate(0em) rotateY(0deg); }
      19.4% { opacity: 1; transform: translate(0em) rotateY(-90deg); }
      22.2% { opacity: 1; transform: translate(1.2em) rotateY(90deg); }
      100%  { opacity: 1; transform: translate(1.2em) rotateY(90deg); }
    }

    @keyframes rect6_animation {
      0%    { opacity: 0; transform: rotateY(0deg); }
      16.6% { opacity: 0; transform: rotateY(0deg); }
      16.7% { opacity: 1; transform: translate(0em) rotateY(0deg); }
      33.3% { opacity: 1; transform: translate(0em) rotateY(180deg); }
      100%  { opacity: 1; transform: translate(0em) rotateY(180deg); }
    }

    /* 加载提示文字 */
    .loading-hint {
      position: absolute;
      bottom: 30%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #999;
      letter-spacing: 2px;
      animation: hint_fade 2s ease-in-out infinite;
    }

    @keyframes hint_fade {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <!-- Flutter 加载界面 -->
  <div id="flutter-loading">
    <div class="effect">
      <i class="letter">Y</i>
      <i class="letter">U</i>
      <i class="letter">D</i>
      <i class="letter">A</i>
      <i class="letter">O</i>
      <i class="letter">.</i>
      <div class="rect"></div>
      <div class="rect"></div>
      <div class="rect"></div>
      <div class="rect"></div>
      <div class="rect"></div>
      <div class="rect"></div>
    </div>
    <div class="loading-hint">正在加载中...</div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <!-- 启动优化脚本 -->
  <script>
    // 监听 Flutter 引擎准备就绪
    window.addEventListener('flutter-first-frame', function() {
      const loading = document.getElementById('flutter-loading');
      loading.classList.add('fade-out');
      setTimeout(() => loading.remove(), 500);
    });
  </script>
</body>
</html>
