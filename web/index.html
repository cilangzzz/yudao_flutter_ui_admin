<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="yudao flutter ui实现">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="yudao_flutter_ui_admin">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>yudao_flutter_ui_admin</title>
  <link rel="manifest" href="manifest.json">

  <!-- 启动优化样式 -->
  <style>
    /* 加载容器 */
    #flutter-loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
    }

    #flutter-loading.fade-out {
      opacity: 0;
      visibility: hidden;
    }

    /* Logo 动画 */
    .loading-logo {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .loading-logo svg {
      width: 100%;
      height: 100%;
      fill: white;
    }

    /* 加载指示器 */
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    /* 加载文字 */
    .loading-text {
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      font-size: 16px;
      margin-top: 16px;
      opacity: 0.9;
    }

    /* 进度条 */
    .loading-progress {
      width: 200px;
      height: 4px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 2px;
      margin-top: 16px;
      overflow: hidden;
    }

    .loading-progress-bar {
      width: 0%;
      height: 100%;
      background: white;
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    /* 动画定义 */
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.05);
        opacity: 0.8;
      }
    }

    /* 淡入动画 */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .loading-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 0.6s ease-out;
    }
  </style>
</head>
<body>
  <!-- Flutter 加载界面 -->
  <div id="flutter-loading">
    <div class="loading-content">
      <!-- Logo -->
      <div class="loading-logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
        </svg>
      </div>
      <!-- 加载指示器 -->
      <div class="loading-spinner"></div>
      <!-- 加载文字 -->
      <div class="loading-text">正在加载...</div>
      <!-- 进度条 -->
      <div class="loading-progress">
        <div class="loading-progress-bar" id="loading-progress-bar"></div>
      </div>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <!-- 启动优化脚本 -->
  <script>
    // 进度条动画
    let progress = 0;
    const progressBar = document.getElementById('loading-progress-bar');
    const progressInterval = setInterval(() => {
      if (progress < 90) {
        progress += Math.random() * 15;
        if (progress > 90) progress = 90;
        progressBar.style.width = progress + '%';
      }
    }, 200);

    // 监听 Flutter 加载完成
    window.addEventListener('load', function() {
      // 模拟进度完成
      clearInterval(progressInterval);
      progressBar.style.width = '100%';

      // 延迟移除加载界面，让用户看到完成状态
      setTimeout(function() {
        document.getElementById('flutter-loading').classList.add('fade-out');
        // 完全移除元素
        setTimeout(function() {
          document.getElementById('flutter-loading').remove();
        }, 500);
      }, 300);
    });

    // 监听 Flutter 引擎准备就绪
    window.addEventListener('flutter-first-frame', function() {
      clearInterval(progressInterval);
      progressBar.style.width = '100%';
      setTimeout(function() {
        document.getElementById('flutter-loading').classList.add('fade-out');
        setTimeout(function() {
          document.getElementById('flutter-loading').remove();
        }, 500);
      }, 200);
    });
  </script>
</body>
</html>
