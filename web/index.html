  <style>
    /* 隐藏 Flutter 默认加载指示器 */
    flutter-loader,
    .flutter-loader {
      display: none !important;
    }

    /* 加载容器 */
    #flutter-loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
    }

    /* 浅色主题背景 */
    #flutter-loading {
      background: linear-gradient(135deg, #f0f5ff 0%, #e6f4ff 50%, #f0f5ff 100%);
    }

    /* 深色主题 */
    @media (prefers-color-scheme: dark) {
      #flutter-loading {
        background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
      }

      .loading-text {
        color: #e6f4ff;
      }

      .loading-hint {
        color: #8b949e;
      }

      .loading-bar-track {
        background: rgba(24, 144, 255, 0.2);
      }
    }

    #flutter-loading.fade-out {
      opacity: 0;
      visibility: hidden;
    }

    /* Logo 容器 */
    .logo-container {
      position: relative;
      width: 120px;
      height: 120px;
      margin-bottom: 32px;
    }

    /* Logo 背景光晕 */
    .logo-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100px;
      height: 100px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(24, 144, 255, 0.3) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulse_glow 2s ease-in-out infinite;
    }

    @keyframes pulse_glow {

      0%,
      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0.6;
      }

      50% {
        transform: translate(-50%, -50%) scale(1.3);
        opacity: 0.3;
      }
    }

    /* Logo 文字 */
    .logo-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 42px;
      font-weight: 700;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      color: #1890FF;
      letter-spacing: -1px;
    }

    @media (prefers-color-scheme: dark) {
      .logo-text {
        color: #40a9ff;
      }
    }

    /* 环形进度指示器 */
    .spinner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90px;
      height: 90px;
    }

    .spinner-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 3px solid transparent;
      animation: spin 1.5s linear infinite;
    }

    .spinner-ring:nth-child(1) {
      border-top-color: #1890FF;
      animation-delay: 0s;
    }

    .spinner-ring:nth-child(2) {
      width: 75%;
      height: 75%;
      top: 12.5%;
      left: 12.5%;
      border-right-color: #52C41A;
      animation-delay: -0.3s;
      animation-direction: reverse;
    }

    .spinner-ring:nth-child(3) {
      width: 50%;
      height: 50%;
      top: 25%;
      left: 25%;
      border-bottom-color: #FAAD14;
      animation-delay: -0.6s;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    /* 加载文字 */
    .loading-text {
      font-size: 24px;
      font-weight: 600;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      color: #1890FF;
      margin-bottom: 24px;
      letter-spacing: 2px;
    }

    @media (prefers-color-scheme: dark) {
      .loading-text {
        color: #40a9ff;
      }
    }

    /* 加载进度条 */
    .loading-bar {
      width: 200px;
      height: 4px;
      position: relative;
      overflow: hidden;
      border-radius: 2px;
      margin-bottom: 16px;
    }

    .loading-bar-track {
      width: 100%;
      height: 100%;
      background: rgba(24, 144, 255, 0.15);
      border-radius: 2px;
    }

    .loading-bar-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, #1890FF, #40a9ff);
      border-radius: 2px;
      animation: loading_bar 1.5s ease-in-out infinite;
    }

    @keyframes loading_bar {
      0% {
        left: -30%;
        width: 30%;
      }

      50% {
        width: 50%;
      }

      100% {
        left: 100%;
        width: 30%;
      }
    }

    /* 加载提示文字 */
    .loading-hint {
      font-size: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #8c8c8c;
      letter-spacing: 1px;
      animation: hint_fade 2s ease-in-out infinite;
    }

    @keyframes hint_fade {

      0%,
      100% {
        opacity: 0.5;
      }

      50% {
        opacity: 1;
      }
    }

    /* 装饰粒子 */
    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
    }

    .particle {
